<!-- ═══ MAIN APP ═══ -->
<div id="app" class="app" style="display:none">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="logo-mark" width="32" height="32" viewBox="0 0 72 72" fill="none" aria-hidden="true">
        <circle cx="36" cy="36" r="34" stroke="currentColor" stroke-width="2" opacity="0.15"/>
        <circle cx="36" cy="36" r="14" stroke="var(--color-primary)" stroke-width="2.5"/>
        <circle cx="36" cy="36" r="4" fill="var(--color-primary)"/>
        <line x1="36" y1="2" x2="36" y2="22" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
        <line x1="36" y1="50" x2="36" y2="70" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
        <line x1="2" y1="36" x2="22" y2="36" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
        <line x1="50" y1="36" x2="70" y2="36" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      </svg>
      <h1><span>Spinners</span></h1>
    </div>
    <div class="header-right">
      <button class="rider-badge" onclick="logout()">
        <span class="rider-avatar" id="header-avatar"></span>
        <span id="header-name"></span>
      </button>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">

      </button>
    </div>
  </header>

  <!-- Countdown -->
  <div class="countdown-bar">
    <div>
      <div class="countdown-label">Tour de Brisbane</div>
      <div class="countdown-value" id="countdown-days"></div>
    </div>
    <div class="countdown-detail">
      <div>Sun 12 April 2026</div>
      <div style="color:var(--color-primary)" id="countdown-target"></div>
    </div>
  </div>

  <!-- Tab content -->
  <div id="tab-dashboard" class="tab-content"></div>
  <div id="tab-training" class="tab-content" style="display:none"></div>

<!-- Log Ride Modal -->
<div id="ride-modal" class="modal-overlay">
  <div class="modal">
    <h2>Log a Ride</h2>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input type="date" class="form-input" id="ride-date">
    </div>
    <div class="form-group">
      <label class="form-label">Distance (km)</label>
      <input type="number" class="form-input" id="ride-distance" placeholder="e.g. 45" step="0.1">
    </div>
    <div class="form-group">
      <label class="form-label">Duration (minutes)</label>
      <input type="number" class="form-input" id="ride-duration" placeholder="e.g. 90">
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-select" id="ride-type">
        <option value="group">Group Ride (Spinners)</option>
        <option value="solo">Solo Ride</option>
        <option value="race">Race / Event</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input type="text" class="form-input" id="ride-notes" placeholder="How was the ride?">
    </div>
    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-4)">
      <button class="btn btn-ghost" style="flex:1" onclick="closeRideModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitRide()">Save Ride</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay">
  <div class="modal">
    <h2>Your Settings</h2>
    <div class="form-group">
      <label class="form-label">Target Distance</label>
      <div class="pill-toggle" id="distance-toggle">
        <button class="pill-btn" data-val="80" onclick="setDistance(80)">80km</button>
        <button class="pill-btn active" data-val="110" onclick="setDistance(110)">110km</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fitness Level</label>
      <div class="pill-toggle" id="fitness-toggle">
        <button class="pill-btn" data-val="beginner" onclick="setFitness('beginner')">Beginner</button>
        <button class="pill-btn active" data-val="intermediate" onclick="setFitness('intermediate')">Intermediate</button>
        <button class="pill-btn" data-val="advanced" onclick="setFitness('advanced')">Advanced</button>
      </div>
    </div>
    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-6)">
      <button class="btn btn-ghost" style="flex:1" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
